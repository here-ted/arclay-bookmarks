<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arclay Bookmarks</title>
  <script src="sidebar-theme.js"></script>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <div id="search-container" class="search-container">
      <input id="search-input" type="search" placeholder="Search bookmarks and tabs" autocomplete="off" spellcheck="false">
    </div>

    <div id="bookmarks-section" class="section">
      <div class="section-header">Bookmarks</div>
      <div id="bookmarks-tree" class="tree-container">
        <!-- 书签 DOM 节点会动态插入这里 -->
      </div>
    </div>
    
    <div class="divider" id="drag-divider"></div>
    
    <div id="tabs-section" class="section">
      <div class="section-header">Open Tabs</div>
      <div id="tabs-list" class="list-container">
        <!-- 标签页 DOM 节点会动态插入这里 -->
      </div>
    </div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
